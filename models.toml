# Configuration des modèles pour Bytebot

[models]
# Modèles Ollama locaux
ollama_qwen3-30b = "qwen3:30b"
ollama_gemma3-12b = "gemma3:12b"
ollama_gemma3-27b = "gemma3:27b"
ollama_llama3_1-8b = "llama3.1:8b"
ollama_deepseek-r1-14b = "deepseek-r1:14b"
ollama_deepseek-r1-32b = "deepseek-r1:32b"
ollama_qwq = "qwq:latest"
ollama_magistral = "huihui_ai/magistral-abliterated:latest"

# Modèle OpenRouter gratuit validé en production
openrouter_nemotron_vl_free = "nvidia/nemotron-nano-12b-v2-vl:free"

[default]
model = "openrouter_nemotron_vl_free"
